defaults:
  - _self_
  - prob: tsp
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

from_pid: 0
to_pid: 1000
n_processes: 1
split: train
seed: 7
seed_dataset: 1234

# Optional override for DD JSON.
dd_path: null

# Sampling and output options.
data:
  neg_to_pos_ratio: 1.0
  concat: true
  zip: false

hydra:
  output_subdir: null
  run:
    dir: .
  sweep:
    dir: .
    subdir: ''
