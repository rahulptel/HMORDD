defaults:
  - _self_
  - prob: tsp
  - model: gtf
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

seed: 7
device: null

# Optional: override dataset root or DD JSON path.
dataset_root: null
dd_path: null

optimizer:
  type: Adam
  lr: 1e-3
  decay_lr: false
  min_lr:
  warmup: 0
  wd: 0
  beta1: 0.9
  beta2: 0.999

batch_size: 512
epochs: 10
grad_clip: 0.0
eval_every: 150
weighted_loss: false
metric: f1

n_insts:
  train: 1000
  val: 100
pos_ratio: 1
neg_to_pos_ratio: 1
subsample:
  train: 1
  val: 1
resample: false

hydra:
  output_subdir: null
  run:
    dir: .
  sweep:
    dir: .
    subdir: ''
