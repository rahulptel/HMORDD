defaults:
  - _self_
  - prob: knapsack
  - dd: restricted
  - nsga2: default
  - model: gbt
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

from_pid: 0
to_pid: 1000
n_processes: 1
split: train
dd_type: ${dd.type}
seed: 7
overwrite: true

trial_seeds: [7, 8, 9, 10, 11]

postprocess:
  restricted_dd: true
  nsga2: true

hydra:
  output_subdir: null
  run:
    dir: .
  sweep:
    dir: .
    subdir: ''
